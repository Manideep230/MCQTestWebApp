<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ServiceNow Quiz Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, #1f2a6b, #0b1020 55%);
      color: #e2e8f0;
      padding: 24px;
    }
    .card {
      width: 680px;
      max-width: 95vw;
      background: rgba(20, 24, 44, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 42px 36px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
      text-align: center;
    }
    h1 {
      font-size: 34px;
      margin-bottom: 10px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    p {
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 28px;
      font-size: 15px;
    }
    .actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-block;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: 700;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6c63ff, #8b5cf6);
      color: #ffffff;
      box-shadow: 0 8px 24px rgba(108, 99, 255, 0.35);
    }
    .btn-secondary {
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #e2e8f0;
      background: rgba(255, 255, 255, 0.03);
    }
    .btn:hover {
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>ServiceNow Quiz Portal</h1>
    <p>Welcome to the examination portal. Participants and admins can continue to the secure login page from here.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/login">Go to Login</a>
      <a class="btn btn-secondary" href="/api/exam-status">Check Exam Status API</a>
    </div>
  </main>
</body>
</html>
